# Mailroom configuration example.
#
# Lives at ~/.config/mailroom/config.toml. Use -i NAME to select an [imap.NAME]:
#   mailroom -i work search 'from:alice'
#
# Three layers, each a top-level named-entity table:
#   [imap.NAME]       one IMAP mailbox plus per-block options
#   [smtp.NAME]       a named SMTP endpoint
#   [identity.NAME]   one send identity, with `imap = "..."` naming the
#                     [imap.NAME] block it routes through
#
# An [imap.NAME] block with no [identity.*] pointing at it is read-only:
# drafting and reading work, sending is rejected at send time. To enable
# sending from a block, declare at least one [identity.NAME] with that
# block's name in its `imap` field.

default_imap = "personal"

# ----- SMTP endpoints ----------------------------------------------------
#
# Two patterns coexist:
#
#   Template SMTP (host/port only, no creds).
#       Credentials inherit from the [imap.NAME] block selected at send
#       time. Use for Gmail/Fastmail where the SMTP credential equals
#       the IMAP one.
#
#   Concrete SMTP (host/port/username/password).
#       Credentials live on the SMTP block. Use for SES, where one IAM
#       SMTP user serves many From addresses across many [imap.*] blocks.

[smtp.gmail]
host = "smtp.gmail.com"
port = 587
# username/password omitted on purpose: inherit from the [imap.NAME] in scope.

[smtp.ses-syd]
host = "email-smtp.ap-southeast-2.amazonaws.com"
port = 587
username = "AKIAEXAMPLEEXAMPLE"
password = "BPa+EXAMPLE/EXAMPLE"
save_sent = true                       # SES does not auto-file; mailroom FCCs.
rewrite_msgid_from_response = true     # SES rewrites Message-ID; capture from "250 Ok <token>".

# save_sent values: "auto" | true | false
#   "auto" (default) = false when host endswith gmail.com (server auto-files), true otherwise.
# rewrite_msgid_from_response default = true when host matches SES SMTP endpoints
#   ("email-smtp.<region>.amazonaws.com"), false otherwise.

# ----- IMAP blocks -------------------------------------------------------

# A simple block with one identity: the same address as its IMAP login.
[imap.personal]
host = "imap.gmail.com"
port = 993
username = "you@gmail.com"
password = "abcdefghijklmnop"
default_smtp = "gmail"                 # any identity in this block inherits this.

[identity.personal]
imap = "personal"
address = "you@gmail.com"

# Same shape, different block.
[imap.work]
host = "imap.gmail.com"
port = 993
username = "you@company.com"
password = "another-app-password"
default_smtp = "gmail"
# Optional per-block redact policy. The referenced Sieve file lists
# rules; messages matching any rule are replaced with a placeholder
# Email (date and UID preserved, every other field blanked) before
# reaching the agent or the model provider. The agent sees the
# redacted entry in search results so it knows the message exists;
# it cannot read the parties or the content. Relative paths resolve
# against the directory containing this config.toml. See
# examples/work-only.sieve for the syntax.
# redact = "work-only.sieve"

[identity.work]
imap = "work"
address = "you@company.com"

# A read-only block: no identity points here, so sending is disabled.
# Drafting and reading still work. Valid configuration, not an error.
[imap.archive]
host = "imap.fastmail.com"
port = 993
username = "archive@example.org"
password = "fastmail-app-password"

# Send-as: one Gmail mailbox, multiple From addresses, mixed SMTP routes.
# Each identity declares which [imap.NAME] block it routes through.
[imap.director]
host = "imap.gmail.com"
port = 993
username = "alias-host@gmail.com"      # IMAP login, not necessarily a From address
password = "gmail-app-password"
default_smtp = "gmail"                 # identities inherit unless they override
maildir = "/var/local/mail/director"   # optional, only used if local_cache is enabled

[identity.director]
imap = "director"
address = "director@example.org"
name = "Director Name"                 # optional; bare-address From is fine
smtp = "ses-syd"                       # this identity overrides the block default
fcc = "[Gmail]/Sent Mail"              # Sent folder for the filed copy; false to skip

[identity.director-alias]
imap = "director"
address = "alias-host@gmail.com"
# no name, no smtp override (inherits "gmail"), no fcc (Gmail auto-files).

# A shared sending address that is itself a distribution list: BCC the list so
# the whole team keeps the record, and fcc = false so the sender gets no
# duplicate Sent copy. fcc = false requires a bcc that includes this address.
# [identity.marketing]
# imap    = "company"
# address = "marketing@example.org"
# bcc     = "marketing@example.org"
# fcc     = false

